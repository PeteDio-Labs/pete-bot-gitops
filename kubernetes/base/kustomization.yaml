apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: pete-bot

resources:
  - deployment.yaml
  - service.yaml
  # Sealed secrets for secure credential management
  - sealed-secrets/pete-bot-credentials.yaml

# Use labels with includeSelectors: false to avoid breaking external services
labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false
