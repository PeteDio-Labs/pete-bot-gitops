apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: discord-bot

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
  - qbittorrent-external-service.yaml
  - grafana-dashboard-configmap.yaml
  # Sealed secrets for secure credential management
  - sealed-secrets/discord-bot-credentials.yaml
  - sealed-secrets/nexus-registry.yaml

commonLabels:
  app.kubernetes.io/managed-by: argocd

# Patch to remove selector from external service (prevents auto-discovery of pods)
patches:
  - target:
      kind: Service
      name: qbittorrent-external
    patch: |-
      - op: remove
        path: /spec/selector
