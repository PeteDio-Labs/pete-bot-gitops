apiVersion: v1
kind: Service
metadata:
  name: discord-bot-metrics
  labels:
    app.kubernetes.io/name: discord-bot
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: discord-bot
    app.kubernetes.io/component: bot
