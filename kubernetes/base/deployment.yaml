apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-bot
  labels:
    app.kubernetes.io/name: discord-bot
    app.kubernetes.io/component: bot
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: discord-bot
      app.kubernetes.io/component: bot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: discord-bot
        app.kubernetes.io/component: bot
    spec:
      containers:
        - name: discord-bot
          image: docker.toastedbytes.com/discord-ai-bot:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: discord-bot-credentials
          env:
            # Override QBIT_HOST to use internal Kubernetes service that routes to LAN
            - name: QBIT_HOST
              value: "http://qbittorrent-external:8080"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
      restartPolicy: Always
      imagePullSecrets:
        - name: nexus-registry
