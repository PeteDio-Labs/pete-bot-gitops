apiVersion: apps/v1
kind: Deployment
metadata:
  name: pete-bot
  labels:
    app.kubernetes.io/name: pete-bot
    app.kubernetes.io/component: bot
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pete-bot
      app.kubernetes.io/component: bot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pete-bot
        app.kubernetes.io/component: bot
    spec:
      containers:
        - name: pete-bot
          image: docker.toastedbytes.com/pete-bot:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: pete-bot-credentials
          env:
            - name: MISSION_CONTROL_URL
              value: "http://mission-control-backend.mission-control.svc.cluster.local:3000"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service.mission-control.svc.cluster.local:3002"
            - name: WEB_SEARCH_SERVICE_URL
              value: "http://web-search-service.web-search.svc.cluster.local:3003"
            - name: MISSION_CONTROL_ENABLED
              value: "true"
            - name: EVENT_STREAM_ENABLED
              value: "true"
            - name: OWNER_USER_ID
              value: "81888309009190912"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
      restartPolicy: Always
      imagePullSecrets:
        - name: nexus-registry
