apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: discord-bot

resources:
  - ../../base
  # External service in separate resource to avoid selector issues
  - qbittorrent-external-service.yaml

# Use labels with includeSelectors: false to avoid breaking external services
labels:
  - pairs:
      environment: prod
    includeSelectors: false

images:
  - name: docker.toastedbytes.com/discord-ai-bot
    newTag: latest
